<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>荣耀许愿抽奖 - 方案2(同时跳动版)</title>
    <style>
        /* ================= 基础重置与固定尺寸 ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #111; }
        
        #app {
            width: 1560px; height: 720px; position: relative; overflow: hidden;
            background: url('images/bg.jpg') no-repeat center/cover; 
            font-family: 'Microsoft YaHei', sans-serif;
        }

        /* ================= 界面元素 ================= */
        /* 标题：已向右上移动 */
        .title { position: absolute; top: 15px; left: 250px; width: 350px; transition: opacity 0.3s; }
        
        /* 货币栏 */
        .currency-bar { position: absolute; top: 30px; right: 50px; display: flex; align-items: center; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; transition: opacity 0.3s; border: 1px solid rgba(255,255,255,0.5); }
        .currency-bar img.coin-icon { width: 30px; height: 30px; margin-right: 10px; }
        .currency-bar span { font-size: 24px; font-weight: bold; color: #fff; margin-right: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .btn-add { width: 30px; height: 30px; cursor: pointer; transition: transform 0.1s; }
        .btn-add:active { transform: scale(0.9); }

        /* 中心人物模型：已放大一倍 */
        .character { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 1600px; height: 1600px; pointer-events: none; }
        .character img { width: 100%; height: 100%; object-fit: contain; }

        /* 抽奖按钮区域：已向右移动50px */
        .draw-area { position: absolute; bottom: 40px; left: calc(50% + 50px); transform: translateX(-50%); text-align: center; transition: opacity 0.3s; z-index: 10;}
        .guide-text { font-size: 18px; color: #fff; margin-bottom: 10px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .guide-text span { color: #ffeb3b; font-size: 22px; margin: 0 5px; }
        
        /* 抽奖按钮：已去掉文字样式，纯图片 */
        .btn-draw { width: 300px; height: 80px; background: url('images/btn_draw.png') no-repeat center/contain; cursor: pointer; }
        .btn-draw:active { transform: scale(0.95); }

        /* 跳过按钮 */
        .btn-skip { position: absolute; top: 30px; right: 50px; padding: 10px 20px; background: rgba(0,0,0,0.5); color: white; border-radius: 20px; cursor: pointer; display: none; z-index: 20; font-size: 18px; border: 1px solid #fff; }

        /* ================= 奖励气泡 ================= */
        .prize-container { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        
        .prize { position: absolute; width: 100px; height: 100px; background: url('images/prize_bg.png') no-repeat center/contain; display: flex; justify-content: center; align-items: center; transition: filter 0.3s; }
        .prize img { width: 70%; height: 70%; object-fit: contain; } 
        .prize.drawn { filter: grayscale(100%) opacity(0.5); } 
        .prize.grand { width: 140px; height: 140px; } 

        /* 选中光效：无轨迹瞬间闪现 */
        .highlight { position: absolute; width: 130px; height: 130px; background: url('images/highlight.png') no-repeat center/contain; z-index: 5; transform: translate(-15px, -15px); }
        .highlight.grand-size { width: 180px; height: 180px; transform: translate(-20px, -20px); }

        /* ================= 弹窗样式 ================= */
        .modal-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: white; padding: 40px; border-radius: 20px; text-align: center; min-width: 400px; }
        .modal h2 { margin-bottom: 20px; color: #333; }
        .modal-btns { margin-top: 30px; display: flex; justify-content: center; gap: 20px; }
        .btn-normal { padding: 10px 30px; background: #4facfe; color: white; border-radius: 10px; cursor: pointer; font-size: 18px; }
        .btn-cancel { background: #ccc; }
        
        /* 抽奖结果展示区 */
        .result-items { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .result-item { width: 80px; height: 80px; background: url('images/prize_bg.png') no-repeat center/contain; display: flex; justify-content: center; align-items: center; }
        .result-item img { width: 70%; height: 70%; object-fit: contain; }

        /* 次数选择器 */
        .count-selector { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 20px 0; }
        .count-btn { width: 40px; height: 40px; font-size: 24px; cursor: pointer; }
        .count-input { width: 60px; height: 40px; text-align: center; font-size: 20px; }
    </style>
</head>
<body>

<div id="app">
    <!-- 顶部信息 -->
    <img src="images/title.png" class="title" id="ui-title" alt="亚运星火 荣耀许愿">
    
    <div class="currency-bar" id="ui-currency">
        <img src="images/coin.png" class="coin-icon" alt="许愿币">
        <span id="coin-count">40</span>
        <img src="images/btn_add.png" class="btn-add" onclick="showModal('addCoinModal')" alt="加号">
    </div>
    <div class="btn-skip" id="btn-skip" onclick="skipAnimation()">跳过动画</div>

    <!-- 中心人物 -->
    <div class="character">
        <img src="images/character.png" alt="伽罗">
    </div>

    <!-- 奖励气泡容器 -->
    <div class="prize-container" id="prize-container">
        <!-- 光效由 JS 动态生成 -->
    </div>

    <!-- 底部抽奖区域 -->
    <div class="draw-area" id="ui-draw">
        <div class="guide-text">再许愿<span id="guarantee-count">9</span>次必得伽罗皮肤</div>
        <div class="btn-draw" onclick="handleDrawClick()"></div>
    </div>

    <!-- 弹窗：获取许愿币 -->
    <div class="modal-mask" id="addCoinModal">
        <div class="modal">
            <h2>获得许愿币</h2>
            <p>点击确定获得 40 个许愿币</p>
            <div class="modal-btns">
                <div class="btn-normal btn-cancel" onclick="hideModal('addCoinModal')">取消</div>
                <div class="btn-normal" onclick="addCoins(40)">确定</div>
            </div>
        </div>
    </div>

    <!-- 弹窗：选择抽奖次数 -->
    <div class="modal-mask" id="drawCountModal">
        <div class="modal">
            <h2>选择许愿次数</h2>
            <div class="count-selector">
                <button class="count-btn" onclick="changeDrawCount(-1)">-</button>
                <input type="text" class="count-input" id="draw-count-input" readonly>
                <button class="count-btn" onclick="changeDrawCount(1)">+</button>
            </div>
            <p>消耗: <span id="draw-cost-preview">0</span> 许愿币</p>
            <div class="modal-btns">
                <div class="btn-normal btn-cancel" onclick="hideModal('drawCountModal')">取消</div>
                <div class="btn-normal" onclick="confirmMultiDraw()">开始许愿</div>
            </div>
        </div>
    </div>

    <!-- 弹窗：恭喜获得 -->
    <div class="modal-mask" id="resultModal">
        <div class="modal">
            <h2>恭喜获得</h2>
            <div class="result-items" id="result-items-container"></div>
            <div class="modal-btns">
                <div class="btn-normal" onclick="closeResultModal()">确定</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ================= 核心数据配置 =================
    const COST_PER_DRAW = 4;
    let state = {
        coins: 40,
        guaranteeLeft: 9,
        availablePrizes: [0, 1, 2, 3, 4, 5, 6, 7, 8], 
        isAnimating: false,
        isSkipping: false,
        selectedDrawCount: 1,
        maxPossibleDraws: 1,
        currentDrawResults: [],
        activeHighlights: [] // 记录当前屏幕上的光效元素
    };

    const prizePositions = [
        { left: 500, top: 150 }, { left: 350, top: 350 }, { left: 450, top: 450 }, // 左侧
        { left: 400, top: 250 }, { left: 550, top: 500 }, // 中左/中下
        { left: 1100, top: 250 }, { left: 1200, top: 300 }, { left: 1300, top: 400 }, // 右侧
        { left: 1100, top: 500, isGrand: true } // 索引8：大奖 (按钮右侧)
    ];

    // ================= 初始化 =================
    function init() {
        const container = document.getElementById('prize-container');
        prizePositions.forEach((pos, index) => {
            const div = document.createElement('div');
            div.className = `prize ${pos.isGrand ? 'grand' : ''}`;
            div.id = `prize-${index}`;
            div.style.left = pos.left + 'px';
            div.style.top = pos.top + 'px';
            
            const img = document.createElement('img');
            img.src = `images/prize_${index + 1}.png`;
            div.appendChild(img);

            container.appendChild(div);
        });
        updateUI();
    }

    function updateUI() {
        document.getElementById('coin-count').innerText = state.coins;
        document.getElementById('guarantee-count').innerText = state.guaranteeLeft;
        
        for(let i=0; i<9; i++) {
            const el = document.getElementById(`prize-${i}`);
            if(!state.availablePrizes.includes(i)) {
                el.classList.add('drawn');
            }
        }
    }

    // ================= 弹窗与基础交互 =================
    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function addCoins(amount) {
        state.coins += amount;
        updateUI();
        hideModal('addCoinModal');
    }

    function handleDrawClick() {
        if (state.isAnimating) return;
        if (state.availablePrizes.length === 0) {
            alert("奖池已抽空！"); return;
        }
        if (state.coins < COST_PER_DRAW) {
            showModal('addCoinModal'); return;
        }

        let maxByCoin = Math.floor(state.coins / COST_PER_DRAW);
        state.maxPossibleDraws = Math.min(maxByCoin, state.availablePrizes.length);

        if (state.maxPossibleDraws > 1) {
            state.selectedDrawCount = state.maxPossibleDraws;
            updateCountSelector();
            showModal('drawCountModal');
        } else {
            startDrawProcess(1);
        }
    }

    function changeDrawCount(delta) {
        let newVal = state.selectedDrawCount + delta;
        if (newVal >= 1 && newVal <= state.maxPossibleDraws) {
            state.selectedDrawCount = newVal;
            updateCountSelector();
        }
    }

    function updateCountSelector() {
        document.getElementById('draw-count-input').value = state.selectedDrawCount;
        document.getElementById('draw-cost-preview').innerText = state.selectedDrawCount * COST_PER_DRAW;
    }

    function confirmMultiDraw() {
        hideModal('drawCountModal');
        startDrawProcess(state.selectedDrawCount);
    }

    // ================= 方案2(同时跳动版)：核心抽奖与动画逻辑 =================
    async function startDrawProcess(times) {
        state.isAnimating = true;
        state.isSkipping = false;
        state.currentDrawResults = [];
        state.activeHighlights = [];
        
        state.coins -= times * COST_PER_DRAW;
        updateUI();

        // 隐藏UI，显示跳过按钮
        document.getElementById('ui-title').style.opacity = '0';
        document.getElementById('ui-currency').style.opacity = '0';
        document.getElementById('ui-draw').style.opacity = '0';
        document.getElementById('btn-skip').style.display = 'block';

        // 1. 提前决定所有抽中的奖品
        for (let i = 0; i < times; i++) {
            const randomIndex = Math.floor(Math.random() * state.availablePrizes.length);
            const targetPrize = state.availablePrizes[randomIndex];
            
            state.availablePrizes.splice(randomIndex, 1);
            state.guaranteeLeft--;
            state.currentDrawResults.push(targetPrize);
        }

        const container = document.getElementById('prize-container');
        const animationPromises = [];

        // 2. 同时为每个抽中的奖品创建光效并启动跳动动画
        for (let i = 0; i < times; i++) {
            const targetPrize = state.currentDrawResults[i];
            
            // 创建一个新的光效元素
            const hl = document.createElement('div');
            hl.className = 'highlight';
            container.appendChild(hl);
            state.activeHighlights.push(hl);

            if (!state.isSkipping) {
                // 将动画 Promise 存入数组，并发执行
                animationPromises.push(playJumpAnimation(hl, targetPrize));
            } else {
                // 如果已点击跳过，直接将光效定位到目标奖品上
                setHighlightPosition(hl, targetPrize);
            }
        }

        // 3. 等待所有光效的跳动动画同时完成
        if (!state.isSkipping && animationPromises.length > 0) {
            await Promise.all(animationPromises);
            // 所有光效都落位后，稍微停顿一下让玩家看清
            await new Promise(r => setTimeout(r, 600));
        }

        // 4. 移除光效，并将抽中的奖品置灰，弹出结果
        state.activeHighlights.forEach(hl => hl.remove());
        state.activeHighlights = [];
        
        state.currentDrawResults.forEach(prizeIdx => {
            document.getElementById(`prize-${prizeIdx}`).classList.add('drawn');
        });

        finishDraw();
    }

    // 控制单个光效跳动的函数
    function playJumpAnimation(hlElement, targetPrize) {
        return new Promise(resolve => {
            let jumps = 12; // 跳动次数
            let currentJump = 0;
            let delay = 80; // 每次跳动间隔(毫秒)

            function jump() {
                // 如果中途点击了跳过，立即中断动画并定位到终点
                if (state.isSkipping) {
                    setHighlightPosition(hlElement, targetPrize);
                    resolve();
                    return;
                }

                currentJump++;
                let nextPos;

                if (currentJump >= jumps) {
                    // 最后一次，准确落在目标奖品上
                    nextPos = targetPrize;
                } else {
                    // 随机在0-8的奖品位置上闪烁
                    nextPos = Math.floor(Math.random() * 9);
                }

                setHighlightPosition(hlElement, nextPos);

                if (currentJump < jumps) {
                    setTimeout(jump, delay);
                } else {
                    resolve();
                }
            }
            
            jump();
        });
    }

    // 辅助函数：设置光效的位置和大小
    function setHighlightPosition(hlElement, prizeIndex) {
        const posData = prizePositions[prizeIndex];
        hlElement.style.left = posData.left + 'px';
        hlElement.style.top = posData.top + 'px';
        
        if (posData.isGrand) {
            hlElement.classList.add('grand-size');
        } else {
            hlElement.classList.remove('grand-size');
        }
    }

    function skipAnimation() {
        if (!state.isAnimating) return;
        state.isSkipping = true;
    }

    function finishDraw() {
        state.isAnimating = false;
        updateUI();
        
        document.getElementById('ui-title').style.opacity = '1';
        document.getElementById('ui-currency').style.opacity = '1';
        document.getElementById('ui-draw').style.opacity = '1';
        document.getElementById('btn-skip').style.display = 'none';

        const container = document.getElementById('result-items-container');
        container.innerHTML = '';
        state.currentDrawResults.forEach(prizeIdx => {
            const div = document.createElement('div');
            div.className = `result-item`;
            
            const img = document.createElement('img');
            img.src = `images/prize_${prizeIdx + 1}.png`;
            div.appendChild(img);
            
            container.appendChild(div);
        });

        showModal('resultModal');
    }

    function closeResultModal() {
        hideModal('resultModal');
        if(state.availablePrizes.length === 0) {
            document.querySelector('.guide-text').innerHTML = "奖池已清空！";
        }
    }

    window.onload = init;
</script>
</body>
</html>
